<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prowlr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --accent: #e8ff47;
    --accent-dim: #b8cc2a;
    --text: #f0f0f0;
    --muted: #666;
    --danger: #ff4747;
    --green: #47ff8a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; max-width: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    padding: 20px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  header.scrolled { border-color: var(--border); }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .title span { color: var(--text); }

  .search-wrap { display: flex; gap: 8px; margin-bottom: 14px; }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    padding: 14px 20px;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .search-btn:active { transform: scale(0.97); background: var(--accent-dim); }

  .filters {
    display: flex;
    gap: 8px;
    padding-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  .results-meta {
    padding: 12px 16px 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .results { padding: 8px 16px 0; display: flex; flex-direction: column; gap: 10px; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: slideIn 0.2s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-main { padding: 14px 14px 10px; }
  .card-title { font-size: 14px; line-height: 1.4; color: var(--text); margin-bottom: 10px; word-break: break-word; }
  .card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

  .tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    padding: 3px 8px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tag.size { color: var(--text); }
  .tag.seeds { color: var(--green); border-color: #1a3d2a; background: #0d1f16; }
  .tag.indexer { color: #a78bfa; border-color: #2d1f4a; background: #150d2a; }

  .card-actions { display: flex; gap: 8px; }

  .btn-dl {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #000;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    padding: 12px;
    text-align: center;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-dl:active { transform: scale(0.98); background: var(--accent-dim); }
  .btn-dl.sending { background: var(--border); color: var(--muted); pointer-events: none; }
  .btn-dl.sent { background: #0d1f16; color: var(--green); border: 1px solid #1a3d2a; pointer-events: none; }
  .btn-dl.error { background: #1f0d0d; color: var(--danger); border: 1px solid #3d1a1a; pointer-events: none; }

  .btn-magnet {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 18px;
    padding: 12px 14px;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-magnet:active { border-color: var(--accent); color: var(--accent); }

  .btn-info {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-info:hover { color: var(--text); border-color: #444; }

  .state-box { padding: 60px 16px; text-align: center; color: var(--muted); }
  .state-box .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .state-box p { font-size: 14px; line-height: 1.6; }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .sort-bar {
    display: flex;
    gap: 6px;
    padding: 8px 16px 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .sort-bar::-webkit-scrollbar { display: none; }

  .sort-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .sort-btn.active { color: var(--accent); background: #1a1f05; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    width: 100%;
    max-width: 360px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .modal-body {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.5;
    word-break: break-word;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-confirm {
    flex: 1;
    padding: 13px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
  }
  .modal-cancel {
    flex: 1;
    padding: 13px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
  }
</style>
</head>
<body>

<header id="header">
  <div class="title">prowl<span>r</span></div>
  <div class="search-wrap">
    <input class="search-input" id="query" type="search" placeholder="Search torrents..." autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-btn" onclick="doSearch()">GO</button>
  </div>
  <div class="filters" id="filters"></div>
</header>

<div id="sort-bar" class="sort-bar" style="display:none">
  <button class="sort-btn active" onclick="setSort(this,'date')">Latest</button>
  <button class="sort-btn" onclick="setSort(this,'size')">Size</button>
  <button class="sort-btn" onclick="setSort(this,'seeders')">Seeds</button>
  <button class="sort-btn" onclick="setSort(this,'title')">Title</button>
</div>

<div id="results-meta" class="results-meta" style="display:none"></div>
<div id="results" class="results"></div>

<div id="state" class="state-box">
  <div class="icon">🔍</div>
  <p>Search across all<br>configured indexers</p>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">Send to qBittorrent?</div>
    <div class="modal-body" id="modal-torrent-title"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmSend()">Send</button>
    </div>
  </div>
</div>

<script>
let PROWLARR = '';
let API_KEY = '';
let currentCategory = 0;
let currentSort = 'date';
let allResults = [];
let pendingGrab = null;

const CAT_DEFAULTS = [
  { name: 'Movies', id: 2000 },
  { name: 'TV',     id: 5000 },
  { name: 'Music',  id: 1000 },
  { name: 'PC',     id: 4000 },
  { name: 'Books',  id: 8000 }
];

async function init() {
  try {
    const res = await fetch('config.json');
    if (!res.ok) throw new Error('config.json not found');
    const cfg = await res.json();
    PROWLARR = (cfg.prowlarr || '').replace(/\/$/, '');
    API_KEY = cfg.apikey || '';
    if (cfg.accent)  document.documentElement.style.setProperty('--accent', cfg.accent);
    if (cfg.bg)      document.documentElement.style.setProperty('--bg', cfg.bg);
    if (cfg.surface) document.documentElement.style.setProperty('--surface', cfg.surface);
    if (cfg.text)    document.documentElement.style.setProperty('--text', cfg.text);
    renderFilters(cfg.categories || CAT_DEFAULTS);
  } catch (e) {
    document.getElementById('state').innerHTML = `<div class="icon">⚠️</div><p>Could not load config.json<br><small>${e.message}</small></p>`;
    renderFilters(CAT_DEFAULTS);
  }
}

function renderFilters(cats) {
  const container = document.getElementById('filters');
  container.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setCategory(allBtn, 0);
  container.appendChild(allBtn);
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat.name;
    btn.onclick = () => setCategory(btn, cat.id);
    container.appendChild(btn);
  });
}

window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 4);
});

document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

function setCategory(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = cat;
  if (allResults.length) renderResults(allResults);
}

function setSort(btn, key) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = key;
  if (allResults.length) renderResults(allResults);
}

async function doSearch() {
  if (!PROWLARR || !API_KEY) {
    document.getElementById('state').innerHTML = '<div class="icon">⚠️</div><p>Prowlarr not configured.<br>Check config.json</p>';
    return;
  }
  const q = document.getElementById('query').value.trim();
  if (!q) return;

  document.getElementById('state').innerHTML = '<div class="spinner"></div><p>Searching...</p>';
  document.getElementById('state').style.display = 'block';
  document.getElementById('results').innerHTML = '';
  document.getElementById('results-meta').style.display = 'none';
  document.getElementById('sort-bar').style.display = 'none';

  try {
    let url = `${PROWLARR}/api/v1/search?query=${encodeURIComponent(q)}&apikey=${API_KEY}&limit=100`;
    if (currentCategory > 0) url += `&categories=${currentCategory}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    allResults = data;
    if (!data.length) {
      document.getElementById('state').innerHTML = '<div class="icon">🕳️</div><p>No results found.<br>Try different terms.</p>';
      return;
    }
    document.getElementById('state').style.display = 'none';
    document.getElementById('sort-bar').style.display = 'flex';
    renderResults(data);
  } catch(e) {
    document.getElementById('state').innerHTML = `<div class="icon">⚠️</div><p>Error: ${e.message}<br>Check Prowlarr is running.</p>`;
  }
}

function renderResults(data) {
  let filtered = currentCategory > 0
    ? data.filter(r => r.categories && r.categories.some(c => Math.floor(c.id / 1000) === Math.floor(currentCategory / 1000)))
    : data;

  filtered = [...filtered].sort((a, b) => {
    if (currentSort === 'date') return new Date(b.publishDate || 0) - new Date(a.publishDate || 0);
    if (currentSort === 'size') return (b.size || 0) - (a.size || 0);
    if (currentSort === 'seeders') return (b.seeders || 0) - (a.seeders || 0);
    if (currentSort === 'title') return (a.title || '').localeCompare(b.title || '');
    return 0;
  });

  const meta = document.getElementById('results-meta');
  meta.textContent = `${filtered.length} results`;
  meta.style.display = 'block';

  const container = document.getElementById('results');
  container.innerHTML = '';

  filtered.forEach((r, i) => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.style.animationDelay = `${Math.min(i * 20, 300)}ms`;

    const size = r.size ? formatSize(r.size) : '?';
    const seeds = r.seeders != null ? r.seeders : '?';
    const indexer = r.indexer || '';
    const hasMagnet = !!r.magnetUrl;
    const cardId = `card-${i}`;

    card.innerHTML = `
      <div class="card-main">
        <div class="card-title">${escHtml(r.title)}</div>
        <div class="card-meta">
          <span class="tag size">📦 ${size}</span>
          <span class="tag seeds">▲ ${seeds}</span>
          ${indexer ? `<span class="tag indexer">${escHtml(indexer)}</span>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-dl" id="${cardId}" data-index="${i}">⬇ Send to qBit</button>
          ${hasMagnet ? `<a class="btn-magnet" href="${escHtml(r.magnetUrl)}" title="Open magnet">🧲</a>` : ''}
          ${r.infoUrl ? `<a class="btn-info" href="${escHtml(r.infoUrl)}" target="_blank" rel="noopener">↗ Info</a>` : ''}
        </div>
      </div>
    `;
    container.appendChild(card);
    card.querySelector('.btn-dl').addEventListener('click', function() {
      const result = filtered[parseInt(this.dataset.index)];
      sendToQbit(this.id, result.guid || '', result.indexerId || 0, result.title || result.guid || '');
    });
  });
}

function sendToQbit(cardId, guid, indexerId, title) {
  pendingGrab = { cardId, guid, indexerId };
  document.getElementById('modal-torrent-title').textContent = title || guid;
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  pendingGrab = null;
}

async function confirmSend() {
  if (!pendingGrab) return;
  const { cardId, guid, indexerId } = pendingGrab;
  closeModal();

  const btn = document.getElementById(cardId);
  btn.className = 'btn-dl sending';
  btn.textContent = '...';

  try {
    const res = await fetch(`${PROWLARR}/api/v1/search?apikey=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guid, indexerId })
    });
    if (res.ok) {
      btn.className = 'btn-dl sent';
      btn.textContent = '✓ Added';
    } else {
      const text = await res.text();
      throw new Error(`Prowlarr ${res.status}: ${text}`);
    }
  } catch(e) {
    btn.className = 'btn-dl error';
    btn.textContent = '✗ Failed';
    console.error(e);
  }
}

function formatSize(bytes) {
  if (!bytes) return '?';
  const gb = bytes / 1073741824;
  if (gb >= 1) return gb.toFixed(2) + ' GB';
  const mb = bytes / 1048576;
  if (mb >= 1) return mb.toFixed(0) + ' MB';
  return Math.round(bytes / 1024) + ' KB';
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
